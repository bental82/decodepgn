<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <script>
      // apply the saved theme + palette before first paint (no flash of the
      // wrong colors for users who picked non-default ones)
      try {
        document.documentElement.dataset.theme = localStorage.getItem('decodepgn.theme') || 'dark'
        var pal = localStorage.getItem('decodepgn.palette')
        if (pal && pal !== 'classic') document.documentElement.dataset.palette = pal
      } catch (e) {}
    </script>
    <meta name="theme-color" content="#312e2b" />
    <meta
      name="description"
      content="Upload a PGN and let Claude explain which strategic rules of thumb are relevant on each move."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23f97316'/%3E%3Ctext x='50' y='74' font-size='66' text-anchor='middle' fill='white'%3E%E2%99%9F%3C/text%3E%3C/svg%3E"
    />
    <title>DecodePGN — which rules of thumb apply, move by move</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
